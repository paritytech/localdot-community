# .publish-ack.yml — audit trail for accept-with-reason / escalated findings
# from the opensourcing-check pre-publish audit of the LocalDOT community snapshot.
# Each entry records a deliberate decision so a reviewer can see it was not a miss.
version: 1
repo: paritytech/localdot-community
audited_at: 2026-06-08
audited_commit: 0a90b45 # source paritytech/p2p-market HEAD the snapshot was taken from

accepts:
  - id: papi-descriptors-file-dep
    item: 2
    location: apps/web/package.json, packages/bulletin/package.json
    finding: >-
      Dependency "@polkadot-api/descriptors" uses "file:.papi/descriptors".
    reason: >-
      Not an external branch/fork dependency — it is a workspace-local package
      generated by the PAPI codegen step (`papi`, part of the build script
      `papi && tsc && vite build`) from committed chain metadata. Standard PAPI
      pattern; verified to install and typecheck reproducibly on a fresh clone.
    mitigation: >-
      Build flow documented in README/CLAUDE; `papi` regenerates the descriptors.
    accepted_by: Dragan Milosevic (maintainer)

  - id: dotli-placeholder-host
    item: 5
    location: .claude/skills/dotli/SKILL.md:125-126
    finding: >-
      Bulletin collator multiaddrs reference host "internal-host.example".
    reason: >-
      Already sanitized — an RFC 2606 documentation placeholder that replaced a
      former internal host (parity-testnet.parity.io). Not a real endpoint; the
      snippet is a caveated, non-functional example.
    mitigation: Internal host replaced with a reserved-example placeholder.
    accepted_by: Dragan Milosevic (maintainer)

  - id: public-polkadot-endpoints
    item: 5
    location: README.md, .github/env, apps/web/src/lib/constants.ts
    finding: Default WSS/RPC/IPFS endpoints point at *.polkadot.io hosts.
    reason: >-
      Public Paseo Next v2 testnet endpoints, required for the app to function
      out of the box. Not internal infrastructure.
    mitigation: Documented as public testnet defaults; overridable via env.
    accepted_by: Dragan Milosevic (maintainer)

  - id: deployed-contract-addresses
    item: 5
    location: .github/env
    finding: >-
      VITE_P2PMARKET_ADDRESS / VITE_ZKPASSPORT_REGISTRY_ADDRESS are populated.
    reason: >-
      Public on-chain H160 addresses of the reference deployment on Paseo Next;
      not secrets.
    mitigation: None needed; public data.
    accepted_by: Dragan Milosevic (maintainer)

  - id: lockfile-version-strings
    item: 5
    location: pnpm-lock.yaml
    finding: >-
      The scanner's private-IP regex matched npm version strings like "10.4.24".
    reason: >-
      False positive — these are package version numbers, not 10.x.x.x private
      IP addresses.
    mitigation: None needed.
    accepted_by: Dragan Milosevic (maintainer)

escalations:
  - id: hippocratic-and-unlicensed-deps
    item: 6
    location: react-leaflet@4.2.1, "@react-leaflet/core"@2.1.0, "@zkpassport/utils"@0.35.0
    finding: >-
      react-leaflet / @react-leaflet/core are Hippocratic-2.1 (a non-OSI license
      with use restrictions); @zkpassport/utils declares no SPDX license. Possible
      tension with the GPL-3.0-only outbound license.
    action: >-
      Escalated to Parity Legal (Gustav Hemmelmayr) — note prepared. Resolve
      before the public flip.
    owner: Parity Legal

notes:
  secret_scan: >-
    gitleaks ran against the FULL history of the source repo (663 commits) — the
    only finding was the public Substrate Alice dev seed in
    .claude/skills/previewnet.md, which is excluded from this snapshot. gitleaks on
    the snapshot working tree returns 0 findings. The opensourcing-check scanner
    reports secret_scan_run=false only because the staging snapshot has no .git to
    re-scan; the gate is satisfied.
  second_pair_of_eyes: >-
    Pending (checklist item 10) — review the staging snapshot, not the internal
    repo, before flipping public.
